# 复制为 myServerconfig.cfg 后使用。
# myServerconfig.cfg 已被 Git 忽略；不要提交 RCON 密码或 QQ 共享密钥。

# 基础服务器信息
sv_name "BauPlayerMusic"
sv_map "a"
sv_port 8303
sv_max_clients 64

# 上公网前必须更换为高强度密码。
sv_rcon_password "CHANGE_ME_use_a_unique_24_character_or_longer_password"
sv_rcon_max_tries 5
sv_rcon_bantime 60

# Python 后端保持本机访问，端口必须与 .env 的 BPMUSIC_PORT 一致。
sv_music_backend_url "http://127.0.0.1:5000"

# 点歌参数
sv_music_global_cooldown 10
sv_music_player_cooldown 100
sv_music_search_results 10
sv_music_vote_search_results 20
sv_music_playlist_visible 10
sv_music_vote_progress_refresh 1
sv_music_max_song_duration 3600

# QQ 消息转发。启用时 token 必须与 BPMUSIC_QQBOT_SERVER_TOKEN 完全相同。
sv_music_qq_relay 0
sv_music_qq_token ""

# 可选：提供给客户端下载地图的 HTTPS 公网前缀，末尾保留斜杠。
# sv_maps_base_url "https://maps.example.com/"
sv_maps_base_url ""

# 建议先保持私服，确认 RCON、后端、防火墙和对象存储均正常后再改为 1。
sv_register 0
